spring:
  application:
    name: security
  datasource:
    url: jdbc:mysql://localhost:3306/spring_security_practice
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true
logging:
  level:
    org:
      springframework:
        security: DEBUG
        web: INFO